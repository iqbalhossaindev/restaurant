<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dish Studio</title>
  <meta name="description" content="Modern food showcase website with swipe slider and responsive menu layout." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="256x256" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="#">
        <img src="assets/favicon.svg" alt="Dish Studio icon" class="brand-icon" />
        <div>
          <div class="brand-title">Dish Studio</div>
          <div class="brand-subtitle">Menu Showcase</div>
        </div>
      </a>

      <nav class="header-actions" aria-label="Main controls">
        <button class="icon-btn" id="prevBtn" aria-label="Previous dish">
          <span>‹</span>
        </button>
        <button class="icon-btn" id="nextBtn" aria-label="Next dish">
          <span>›</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow" id="heroTag">Best Seller</p>
          <h1 id="heroTitle">Chicken Biryani</h1>
          <p class="hero-subtitle" id="heroSubtitle">Signature Bowl</p>
          <p class="hero-description" id="heroDescription">
            Fragrant basmati rice, roasted chicken, toasted spices, and herbs.
          </p>

          <div class="hero-meta">
            <div class="meta-pill">
              <span>Price</span>
              <strong id="heroPrice">$18</strong>
            </div>
            <div class="meta-pill meta-note">
              <span>Use arrows or swipe</span>
              <strong>Slide to change dish</strong>
            </div>
          </div>

          <div class="hero-thumbs" id="thumbs" aria-label="Dish options"></div>
        </div>

        <div class="hero-stage" id="heroStage" aria-live="polite">
          <div class="stage-glow stage-glow-1"></div>
          <div class="stage-glow stage-glow-2"></div>
          <div class="image-frame">
            <img id="heroImage" src="" alt="" class="hero-image" draggable="false" />
          </div>
          <div class="swipe-hint">Swipe</div>
        </div>
      </section>

      <section class="menu-section">
        <div class="section-head">
          <div>
            <p class="section-kicker">Current menu</p>
            <h2>Added menu items</h2>
          </div>
          <p class="section-note">Responsive on mobile and desktop</p>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
